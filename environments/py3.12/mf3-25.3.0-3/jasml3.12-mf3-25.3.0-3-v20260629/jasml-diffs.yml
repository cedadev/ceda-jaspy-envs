# diffs from Jaspy to JasML

# list any packages to exclude (just the names, without versions)
# also any to required (names with optional versioning)
# pip packages to require will be listed in output yaml, although they
# will not necessarily be installed separately, if already satisfied via
# conda packages


comments:
  - JasML environment file
  
conda:
  exclude:
  require:

pip:
