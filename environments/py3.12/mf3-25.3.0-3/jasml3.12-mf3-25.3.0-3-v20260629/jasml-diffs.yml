    - lightgbm
    - lightning
    - matplotlib
    - mlflow
    - ninja
    - numba
    - numpy
    - onnx
    - onnxruntime-gpu
    - opencv-python-headless
    - optax
    - optuna
    - orbax-checkpoint
    - pip
    - pkgconfig
    - plotly
